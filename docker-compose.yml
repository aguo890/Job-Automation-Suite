services:
  job-automation-suite:
    build: .
    container_name: job_suite
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # --- Hot Reload: Source Code ---
      # Dashboard & pages
      - ./job-scraping-app/dashboard.py:/app/job-scraping-app/dashboard.py
      - ./job-scraping-app/pages:/app/job-scraping-app/pages
      # Core modules
      - ./cv_bridge.py:/app/cv_bridge.py
      - ./ai_tailor.py:/app/ai_tailor.py
      - ./job-scraping-app/processor.py:/app/job-scraping-app/processor.py
      - ./job-scraping-app/main.py:/app/job-scraping-app/main.py
      - ./job-scraping-app/fetchers.py:/app/job-scraping-app/fetchers.py
      - ./job-scraping-app/reporter.py:/app/job-scraping-app/reporter.py
      - ./job-scraping-app/scheduler.py:/app/job-scraping-app/scheduler.py
      - ./job-scraping-app/utils:/app/job-scraping-app/utils

      # --- Data Persistence ---
      - ./job-scraping-app/config:/app/config
      - ./job-scraping-app/config:/app/job-scraping-app/config
      - ./job-scraping-app/data:/app/job-scraping-app/data

      # --- CV Generation Persistence ---
      - ./generated_cvs:/app/generated_cvs
      - ./rendercv:/app/rendercv
    # [AI AGENT CONTEXT]: Native healthcheck hitting Streamlit's built-in endpoint.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    # [AI AGENT CONTEXT]: Crucial for zero-downtime. Starts the new container and waits 
    # for the healthcheck to pass BEFORE killing the old container.
    deploy:
      update_config:
        order: start-first
        failure_action: rollback

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    working_dir: /app/job-scraping-app
    command: python scheduler.py
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPOSITORY=${GITHUB_REPOSITORY}
    labels:
      - "ofelia.enabled=true"
      - "ofelia.job-exec.dr-backup.schedule=0 3 * * *"
      - "ofelia.job-exec.dr-backup.command=/bin/bash /app/scripts/github_backup.sh"
    volumes:
      # --- Hot Reload: Source Code & Scripts ---
      - ./scripts:/app/scripts
      - ./cv_bridge.py:/app/cv_bridge.py
      - ./ai_tailor.py:/app/ai_tailor.py
      - ./job-scraping-app/processor.py:/app/job-scraping-app/processor.py
      - ./job-scraping-app/main.py:/app/job-scraping-app/main.py
      - ./job-scraping-app/fetchers.py:/app/job-scraping-app/fetchers.py
      - ./job-scraping-app/reporter.py:/app/job-scraping-app/reporter.py
      - ./job-scraping-app/scheduler.py:/app/job-scraping-app/scheduler.py
      - ./job-scraping-app/utils:/app/job-scraping-app/utils

      # --- Data Persistence ---
      - ./job-scraping-app/config:/app/job-scraping-app/config
      - ./job-scraping-app/data:/app/job-scraping-app/data
      - ./generated_cvs:/app/generated_cvs
      - ./rendercv:/app/rendercv
    restart: unless-stopped
    # [AI AGENT CONTEXT]: Healthcheck based on the scraper heartbeat file.
    healthcheck:
      test: [ "CMD-SHELL", "find /tmp/scraper_heartbeat -mmin -10 | grep scraper_heartbeat || exit 1" ]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
      update_config:
        order: start-first
        failure_action: rollback

  ofelia:
    image: mcuadros/ofelia:latest
    container_name: job_suite_scheduler
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
