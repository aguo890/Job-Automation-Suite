services:
  job-automation-suite:
    build: .
    container_name: job_suite
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # --- Hot Reload: Source Code ---
      # Dashboard & pages
      - ./job-scraping-app/dashboard.py:/app/job-scraping-app/dashboard.py
      - ./job-scraping-app/pages:/app/job-scraping-app/pages
      # Core modules
      - ./cv_bridge.py:/app/cv_bridge.py
      - ./ai_tailor.py:/app/ai_tailor.py
      - ./job-scraping-app/processor.py:/app/job-scraping-app/processor.py
      - ./job-scraping-app/main.py:/app/job-scraping-app/main.py
      - ./job-scraping-app/fetchers.py:/app/job-scraping-app/fetchers.py
      - ./job-scraping-app/reporter.py:/app/job-scraping-app/reporter.py
      - ./job-scraping-app/scheduler.py:/app/job-scraping-app/scheduler.py
      - ./job-scraping-app/utils:/app/job-scraping-app/utils

      # --- Data Persistence ---
      - ./job-scraping-app/config:/app/job-scraping-app/config
      - ./job-scraping-app/data:/app/job-scraping-app/data

      # --- CV Generation Persistence ---
      - ./generated_cvs:/app/generated_cvs
      - ./rendercv:/app/rendercv
    healthcheck:
      # Check if jobs_agg.json was modified in the last 24 hours (86400 seconds)
      test: [ "CMD-SHELL", "test $$(expr $$(date +%s) - $$(stat -c %Y /app/job-scraping-app/data/jobs_agg.json)) -lt 86400 || exit 1" ]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 60s

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    working_dir: /app/job-scraping-app
    command: python scheduler.py
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # --- Hot Reload: Source Code ---
      - ./cv_bridge.py:/app/cv_bridge.py
      - ./ai_tailor.py:/app/ai_tailor.py
      - ./job-scraping-app/processor.py:/app/job-scraping-app/processor.py
      - ./job-scraping-app/main.py:/app/job-scraping-app/main.py
      - ./job-scraping-app/fetchers.py:/app/job-scraping-app/fetchers.py
      - ./job-scraping-app/reporter.py:/app/job-scraping-app/reporter.py
      - ./job-scraping-app/scheduler.py:/app/job-scraping-app/scheduler.py
      - ./job-scraping-app/utils:/app/job-scraping-app/utils

      # --- Data Persistence ---
      - ./job-scraping-app/config:/app/job-scraping-app/config
      - ./job-scraping-app/data:/app/job-scraping-app/data
      - ./generated_cvs:/app/generated_cvs
      - ./rendercv:/app/rendercv
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      # Check if the heartbeat file exists and was modified in the last 40 minutes
      test: [ "CMD-SHELL", "find /tmp/scraper_heartbeat -mmin -40 | grep scraper_heartbeat || exit 1" ]
      interval: 5m
      timeout: 10s
      retries: 3
