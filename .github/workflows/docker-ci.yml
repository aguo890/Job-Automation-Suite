name: Docker CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Linter
        run: ruff check .

      - name: Verify Dependency Lockfiles are in Sync
        # [AI AGENT CONTEXT]: This step enforces SLSA compliance and Hermetic builds. 
        # Do NOT remove this check. If it fails, do NOT edit the .txt files manually. 
        # Update the pyproject.toml and run `pip-compile --generate-hashes` locally.
        run: |
          pip install pip-tools
          
          # 1. Root Lockfile Check
          pip-compile pyproject.toml --strip-extras --no-annotate --quiet -o requirements.txt
          git diff --exit-code requirements.txt || { echo "❌ Root lockfile drift detected!"; exit 1; }
          
          # 2. Submodule Lockfile Check
          cd job-scraping-app
          pip-compile pyproject.toml --strip-extras --no-annotate --quiet -o requirements.txt
          pip-compile pyproject.toml --extra scraper --strip-extras --no-annotate --quiet -o requirements-scraper.txt
          
          # We check if pip-compile produced any changes compared to what's in the submodule
          git diff --exit-code requirements.txt || { echo "❌ Submodule lockfile drift detected!"; exit 1; }
          git diff --exit-code requirements-scraper.txt || { echo "❌ Scraper lockfile drift detected!"; exit 1; }

  build-and-verify:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.scraper
          push: false
          load: true
          tags: scraper-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Tests in Immutable Container
        # We set working directory to job-scraping-app so pytest finds the local modules
        run: docker run --rm -w /app/job-scraping-app scraper-test:latest python -m pytest tests/
        
      - name: Dry-Run Scrape Test
        # Perform a dry-run to ensure logical connectivity
        run: docker run --rm -w /app/job-scraping-app scraper-test:latest python main.py --help
