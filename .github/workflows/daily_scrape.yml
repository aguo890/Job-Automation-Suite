name: Daily Job Scrape

on:
  schedule:
    # PEAK: Every 30 mins from 13:00 to 17:00 UTC (Approx 8 AM - 12 PM EST)
    - cron: '*/30 13-17 * * *'
    # OFF-PEAK: Every 3 hours for the rest of the day
    - cron: '0 0,3,6,9,18,21 * * *'
  workflow_dispatch: # Allows manual trigger from the UI

# SRE RULE: Prevent race conditions with concurrency groups
concurrency:
  group: job-scrape-group
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Existing Data (Source of Truth)
        run: |
          # 1. Create the data directory explicitly so redirection doesn't fail
          mkdir -p job-scraping-app/data
          
          # 2. Try to grab existing state, but don't crash if it's not there
          git fetch origin data-state || echo "Branch not found yet"
          
          # 3. Use a conditional check to see if the file exists on the branch
          if git ls-tree -r origin/data-state --name-only | grep -q "job-scraping-app/data/jobs_agg.json"; then
            git checkout origin/data-state -- job-scraping-app/data/jobs_agg.json
            git checkout origin/data-state -- job-scraping-app/data/applied_jobs.json
          else
            echo "Initializing fresh state files..."
            echo '{ "jobs": [] }' > job-scraping-app/data/jobs_agg.json
            echo '[]' > job-scraping-app/data/applied_jobs.json
          fi
          
          # 4. Ensure we are back on main code before running
          git checkout main -- .

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Verify and Install Dependencies
        run: |
          pip install pip-tools
          # Optimized SRE Header: Check if the lockfile is stale (relative to pyproject.toml)
          if ! pip-compile --verify --output-file=requirements.txt pyproject.toml; then
             echo "⚠️ Lockfile is stale. Regenerating with backtracking resolver..."
             
             # Regenerate with backtracking to capture all binary hashes for the runner
             pip-compile --generate-hashes --resolver=backtracking --output-file=requirements.txt pyproject.toml
             
             # SURGICAL PUSH: Target ONLY the root lockfile to bypass submodule noise
             git config --global user.name "github-actions[bot]"
             git config --global user.email "github-actions[bot]@users.noreply.github.com"
             git add requirements.txt
             
             if git diff --staged --quiet; then
                echo "✨ Lockfile is already hermetic. Skipping push."
             else
                echo "🛡️ Detected Lockfile evolution. Committing updated signatures..."
                git commit -m "🤖 SRE: Auto-update hermetic lockfile (Surgical Fix)"
                git push origin main
             fi
          fi
          
          # Strictly enforce the hashes we just verified
          pip install --require-hashes -r requirements.txt

      - name: Run Scraper (Proactive)
        env:
          # System context for Anti-Bot Jitter
          GITHUB_ACTIONS: "true"
          # Configuration overrides
          STRICT_MODE: "true"
          MAX_YOE: "2"
        run: |
          # SRE: Ensure we are running against a clean Source of Truth
          # This clears any temporary changes from the Locker step if a push happened
          git reset --hard HEAD
          
          # Execute the core engine
          python job-scraping-app/main.py --companies "Anduril, SpaceX, Tesla, Neuralink, X, Grok, Boring Company, OpenAI, Anthropic, Palantir, Scale AI"

      - name: Sync and Commit to data-state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: data-state
          commit_message: "🤖 Auto-ingest jobs: $(date +'%Y-%m-%d %H:%M')"
          file_pattern: 'job-scraping-app/data/jobs_agg.json job-scraping-app/data/applied_jobs.json'
          create_branch: true

      - name: Trigger DR Backup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # CI Awareness: Ensure script has permissions and correct paths
          chmod +x ./scripts/github_backup.sh
          ./scripts/github_backup.sh
