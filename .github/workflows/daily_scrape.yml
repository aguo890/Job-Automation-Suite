name: Daily Job Scrape

on:
  schedule:
    # PEAK: Every 30 mins from 13:00 to 17:00 UTC (Approx 8 AM - 12 PM EST)
    - cron: '*/30 13-17 * * *'
    # OFF-PEAK: Every 3 hours for the rest of the day
    - cron: '0 0,3,6,9,18,21 * * *'
  workflow_dispatch: # Allows manual trigger from the UI

# SRE RULE: Prevent race conditions with concurrency groups
concurrency:
  group: job-scrape-group
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch Existing Data (Source of Truth)
        run: |
          # 1. Create the data directory explicitly so redirection doesn't fail
          mkdir -p job-scraping-app/data
          
          # 2. Try to grab existing state, but don't crash if it's not there
          git fetch origin data-state || echo "Branch not found yet"
          
          # 3. Use a conditional check to see if the file exists on the branch
          if git ls-tree -r origin/data-state --name-only | grep -q "job-scraping-app/data/jobs_agg.json"; then
            git checkout origin/data-state -- job-scraping-app/data/jobs_agg.json
            git checkout origin/data-state -- job-scraping-app/data/applied_jobs.json
          else
            echo "Initializing fresh state files..."
            echo '{ "jobs": [] }' > job-scraping-app/data/jobs_agg.json
            echo '[]' > job-scraping-app/data/applied_jobs.json
          fi
          
          # 4. Ensure we are back on main code before running
          git checkout main -- .

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper (Proactive)
        env:
          # System context for Anti-Bot Jitter
          GITHUB_ACTIONS: "true"
          # Configuration overrides
          STRICT_MODE: "true"
          MAX_YOE: "2"
        run: |
          # SRE: Ensure we are running against a clean Source of Truth
          git reset --hard HEAD
          
          # Persistence Guardrail: Ensure root data/report paths exist for the scraper
          mkdir -p data report generated_cvs job-scraping-app/data
          
          # Lock Buster: Clear any stale locks from previous crashed runs
          rm -f job-scraping-app/data/scraper.lock
          
          # Execute the core engine
          python job-scraping-app/main.py --companies "Anduril, SpaceX, Tesla, Neuralink, X, Grok, Boring Company, OpenAI, Anthropic, Palantir, Scale AI"

      - name: Move data to root for commit
        run: |
          mkdir -p data report
          # Use -r to copy recursively and '|| true' to avoid failure if no new data
          cp -rf job-scraping-app/data/* data/ || true
          cp -rf job-scraping-app/report/* report/ || true

      - name: Auto-Commit Scrape Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: data-state
          commit_message: "🤖 Auto-ingest jobs: $(date +'%Y-%m-%d %H:%M')"
          file_pattern: 'data/*.json report/*.md'
          create_branch: true
          push_options: '--force'

      - name: Trigger DR Backup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # CI Awareness: Ensure script has permissions and correct paths
          chmod +x ./scripts/github_backup.sh
          ./scripts/github_backup.sh
